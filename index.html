<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workspace - P2P Próprio</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>

    <style>
        body { background-color: #f3f4f6; }
        #login-overlay { backdrop-filter: blur(5px); }
        .workspace-card { max-width: 900px; margin: 40px auto; background: #ffffff; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); padding: 2rem 3rem; min-height: 80vh; }
        .ql-toolbar.ql-snow { border: none; border-bottom: 1px solid #e5e7eb; padding: 10px 0; margin-bottom: 20px; }
        .ql-container.ql-snow { border: none; font-size: 1.125rem; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial; color: #374151; line-height: 1.7; }
        .ql-editor { padding: 0; min-height: 400px; }
        .ql-editor.ql-blank::before { left: 0; color: #9ca3af; font-style: normal; }
        .user-avatar { width: 32px; height: 32px; border-radius: 9999px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 14px; border: 2px solid white; margin-left: -8px; position: relative; cursor: pointer; }
        .user-avatar:hover .tooltip { display: block; }
        .tooltip { display: none; position: absolute; top: 110%; background: #1f2937; color: white; padding: 4px 8px; border-radius: 4px; font-size: 12px; white-space: nowrap; z-index: 50; }
        .yRemoteSelection { background-color: rgb(250, 229, 211); }
        .yRemoteSelectionHead { position: absolute; border-left: 2px solid #ff0000; height: 100%; box-sizing: border-box; }
        .yRemoteSelectionHead::after { content: attr(user-name); position: absolute; left: -2px; top: -15px; background-color: #ff0000; color: #fff; font-size: 10px; padding: 2px 4px; border-radius: 2px; white-space: nowrap; }
    </style>
</head>
<body class="text-gray-800 antialiased overflow-x-hidden">

    <div id="login-overlay" class="fixed inset-0 bg-gray-900 bg-opacity-50 z-50 flex items-center justify-center transition-opacity duration-300">
        <div class="bg-white p-8 rounded-xl shadow-2xl max-w-md w-full">
            <h2 class="text-2xl font-bold mb-2">Quem é você?</h2>
            <p class="text-gray-500 mb-6 text-sm">Identifique-se para entrar na sala colaborativa.</p>
            <input type="text" id="username-input" placeholder="Seu nome ou apelido" class="w-full p-3 border border-gray-300 rounded-lg mb-4 focus:ring-2 focus:ring-indigo-500 outline-none" autocomplete="off">
            <button id="join-btn" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-lg hover:bg-indigo-700 transition">Entrar no Workspace</button>
        </div>
    </div>

    <div class="workspace-card" style="display: none;" id="main-app">
        <header class="flex justify-between items-end mb-6 pb-4 border-b border-gray-100">
            <div class="flex-1">
                <span class="text-xs font-bold text-indigo-500 uppercase tracking-wider">Nota Sincronizada</span>
                <div class="flex items-center gap-3 mt-1">
                    <input type="text" id="note-title" placeholder="Título da Página" class="text-4xl font-extrabold text-gray-900 border-none focus:ring-0 outline-none w-full bg-transparent" autocomplete="off">
                </div>
            </div>
            <div class="flex items-center">
                <span class="text-xs font-bold px-2 py-1 rounded bg-gray-100 text-gray-500 mr-4 whitespace-nowrap" id="users-count">Sincronizando...</span>
                <div id="users-list" class="flex pl-2"></div>
            </div>
        </header>

        <main><div id="editor"></div></main>

        <footer class="mt-12 flex justify-between items-center border-t border-gray-100 pt-6">
            <p class="text-xs text-gray-400">Dados salvos no PC e sincronizados via P2P no seu servidor próprio.</p>
            <button id="share-btn" class="bg-indigo-50 text-indigo-700 px-4 py-2 rounded-lg hover:bg-indigo-100 transition font-medium text-sm flex items-center gap-2">
                Copiar Link Mágico
            </button>
        </footer>
    </div>

    <script type="module">
        import * as Y from 'https://esm.sh/yjs@13.6.14';
        import { IndexeddbPersistence } from 'https://esm.sh/y-indexeddb@9.0.12?deps=yjs@13.6.14';
        import { QuillBinding } from 'https://esm.sh/y-quill@1.0.0?deps=yjs@13.6.14,quill@1.3.6';
        
        // CORREÇÃO 1: Importando de volta o WebRTC
        import { WebrtcProvider } from 'https://esm.sh/y-webrtc@10.3.0?deps=yjs@13.6.14';

        const loginOverlay = document.getElementById('login-overlay');
        const mainApp = document.getElementById('main-app');
        const usernameInput = document.getElementById('username-input');
        const joinBtn = document.getElementById('join-btn');

        const myColor = '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0');
        let myName = localStorage.getItem('p2p_username') || '';

        if (myName) usernameInput.value = myName;

        joinBtn.addEventListener('click', () => {
            if (usernameInput.value.trim().length > 1) {
                myName = usernameInput.value.trim();
                localStorage.setItem('p2p_username', myName);
                iniciarWorkspace();
            } else {
                alert("Por favor, digite um nome válido.");
            }
        });

        function iniciarWorkspace() {
            loginOverlay.style.display = 'none';
            mainApp.style.display = 'block';

            const urlParams = new URLSearchParams(window.location.search);
            let roomName = urlParams.get('room');
            if (!roomName) {
                roomName = 'nota-' + Math.random().toString(36).substring(2, 10);
                window.history.replaceState({}, '', `?room=${roomName}`);
            }

            const ydoc = new Y.Doc();
            const yMap = ydoc.getMap('metadata');
            const yText = ydoc.getText('quill-content');

            const localProvider = new IndexeddbPersistence(roomName, ydoc);

            // CORREÇÃO 2: O seu servidor P2P exclusivo, agora com a URL limpa!
            const networkProvider = new WebrtcProvider(roomName, ydoc, {
                signaling: [
                    'wss://meu-servidor-p2p.onrender.com'
                ],
                peerOpts: {
                    config: {
                        iceServers: [
                            { urls: 'stun:stun.l.google.com:19302' },
                            { urls: 'stun:stun1.l.google.com:19302' }
                        ]
                    }
                }
            });

            const awareness = networkProvider.awareness;
            awareness.setLocalStateField('user', { name: myName, color: myColor });

            awareness.on('change', () => {
                const usersListDiv = document.getElementById('users-list');
                const usersCountSpan = document.getElementById('users-count');
                usersListDiv.innerHTML = '';
                
                const states = Array.from(awareness.getStates().values());
                let onlineCount = 0;

                states.forEach(state => {
                    if (state.user) {
                        onlineCount++;
                        const inicial = state.user.name.charAt(0).toUpperCase();
                        const div = document.createElement('div');
                        div.className = 'user-avatar shadow-sm transition-transform hover:scale-110';
                        div.style.backgroundColor = state.user.color;
                        div.innerHTML = `${inicial}<span class="tooltip">${state.user.name}</span>`;
                        usersListDiv.appendChild(div);
                    }
                });

                if(onlineCount > 1) {
                    usersCountSpan.innerText = `${onlineCount} na sala`;
                    usersCountSpan.classList.replace('bg-gray-100', 'bg-green-100');
                    usersCountSpan.classList.replace('text-gray-500', 'text-green-700');
                } else {
                    usersCountSpan.innerText = 'Só você';
                    usersCountSpan.classList.replace('bg-green-100', 'bg-gray-100');
                    usersCountSpan.classList.replace('text-green-700', 'text-gray-500');
                }
            });

            const quill = new Quill('#editor', {
                theme: 'snow',
                placeholder: 'Comece a escrever sua nota...',
                modules: {
                    toolbar: [
                        [{ 'header': [1, 2, 3, false] }],
                        ['bold', 'italic', 'underline', 'strike'],
                        [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                        ['blockquote', 'code-block'],
                        ['clean']
                    ]
                }
            });

            const binding = new QuillBinding(yText, quill, awareness);

            const titleInput = document.getElementById('note-title');
            
            localProvider.on('synced', () => {
                if (!titleInput.value) titleInput.value = yMap.get('title') || '';
            });

            yMap.observe(() => {
                if (document.activeElement !== titleInput) {
                    titleInput.value = yMap.get('title') || '';
                }
            });

            titleInput.addEventListener('input', () => yMap.set('title', titleInput.value));

            document.getElementById('share-btn').addEventListener('click', async () => {
                const url = window.location.href;
                try {
                    await navigator.clipboard.writeText(url);
                    alert('Link copiado! Envie para sua equipe acessar.');
                } catch(e) {
                    const i = document.createElement('input');
                    i.value = url; document.body.appendChild(i); i.select(); document.execCommand('copy'); i.remove();
                    alert('Link copiado pelo método alternativo!');
                }
            });
        }
    </script>
</body>
</html>
