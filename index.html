<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>P2P Notes</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
<script src="https://unpkg.com/quill-cursors@4.0.2/dist/quill-cursors.js"></script>

<style>

body{
background:#f3f4f6;
}

.container{
max-width:900px;
margin:auto;
margin-top:40px;
background:white;
border-radius:12px;
padding:30px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

.avatar{
width:30px;
height:30px;
border-radius:100%;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-weight:bold;
margin-left:-8px;
border:2px solid white;
}

#users{
display:flex;
flex-direction:row-reverse;
}

</style>

</head>

<body class="text-gray-800">

<div id="login" class="fixed inset-0 bg-black/40 flex items-center justify-center">

<div class="bg-white p-8 rounded-xl w-96">

<h2 class="text-xl font-bold mb-3">Entrar</h2>

<input id="name" placeholder="Seu nome"
class="border p-3 w-full rounded mb-4">

<button id="join"
class="bg-indigo-600 text-white w-full py-3 rounded">
Entrar
</button>

</div>

</div>

<div id="app" style="display:none">

<div class="container">

<header class="flex justify-between border-b pb-4 mb-6">

<input id="title"
placeholder="Título da nota"
class="text-3xl font-bold outline-none w-full">

<div class="flex items-center">

<span id="status"
class="text-xs text-gray-500 mr-3">
conectando...
</span>

<div id="users"></div>

</div>

</header>

<div id="editor"></div>

<div class="flex justify-between mt-10 border-t pt-4">

<button id="share"
class="bg-indigo-100 text-indigo-700 px-4 py-2 rounded">
Copiar link
</button>

<span class="text-xs text-gray-400">
sincronização colaborativa
</span>

</div>

</div>

</div>

<script type="module">

import * as Y from "https://esm.sh/yjs@13.6.14"

import { WebrtcProvider } from "https://esm.sh/y-webrtc@10.3.0"

import { WebsocketProvider } from "https://esm.sh/y-websocket@1.5.0"

import { IndexeddbPersistence } from "https://esm.sh/y-indexeddb@9.0.12"

import { QuillBinding } from "https://esm.sh/y-quill@1.0.0"

let username = localStorage.getItem("p2p-name") || ""

document.getElementById("name").value = username

document.getElementById("join").onclick = start

async function start(){

username = document.getElementById("name").value.trim()

if(username.length < 2){

alert("Digite um nome válido")
return

}

localStorage.setItem("p2p-name",username)

document.getElementById("login").style.display="none"
document.getElementById("app").style.display="block"

init()

}

async function init(){

const params = new URLSearchParams(location.search)

let room = params.get("room")

if(!room){

room = crypto.randomUUID()

history.replaceState({},'',`?room=${room}`)

}

const color = "#" + Math.floor(Math.random()*16777215).toString(16)

const ydoc = new Y.Doc()

const yText = ydoc.getText("content")

const yMeta = ydoc.getMap("meta")

const persistence = new IndexeddbPersistence(room,ydoc)

await persistence.whenSynced

let provider

try{

provider = new WebrtcProvider(room,ydoc,{

signaling:["wss://signaling.yjs.dev"]

})

console.log("WebRTC ativo")

}catch{

provider = new WebsocketProvider(

"wss://demos.yjs.dev",

room,

ydoc

)

console.log("fallback websocket")

}

const awareness = provider.awareness

awareness.setLocalStateField("user",{

name:username,
color:color

})

const quill = new Quill("#editor",{

theme:"snow",

modules:{

cursors:true,

toolbar:[
[{header:[1,2,false]}],
["bold","italic","underline"],
[{list:"ordered"},{list:"bullet"}],
["code-block"]
]

}

})

new QuillBinding(yText,quill,awareness)

const title = document.getElementById("title")

title.value = yMeta.get("title") || ""

title.oninput = ()=>{

yMeta.set("title",title.value)

}

yMeta.observe(()=>{

if(document.activeElement !== title){

title.value = yMeta.get("title") || ""

}

})

const usersDiv = document.getElementById("users")

const status = document.getElementById("status")

function updateUsers(){

usersDiv.innerHTML=""

let count = 0

awareness.getStates().forEach(state=>{

if(!state.user) return

count++

const avatar = document.createElement("div")

avatar.className="avatar"

avatar.style.background=state.user.color

avatar.innerText = state.user.name[0].toUpperCase()

avatar.title = state.user.name

usersDiv.appendChild(avatar)

})

status.innerText = count>1 ? count+" online" : "só você"

}

awareness.on("change",updateUsers)

setInterval(updateUsers,2000)

document.getElementById("share").onclick = async ()=>{

await navigator.clipboard.writeText(location.href)

alert("link copiado")

}

}

</script>

</body>

</html>
