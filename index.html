<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Pequenos ajustes para melhorar a experiência visual */
        body { background-color: #f3f4f6; }
        .workspace-card {
            max-width: 800px;
            margin: 40px auto;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            padding: 2.5rem;
        }
        /* Esconde a barra de rolagem do textarea mas mantém a funcionalidade */
        textarea::-webkit-scrollbar { width: 8px; }
        textarea::-webkit-scrollbar-track { background: transparent; }
        textarea::-webkit-scrollbar-thumb { background-color: #e5e7eb; border-radius: 20px; }
    </style>
</head>
<body class="text-gray-800 antialiased">

    <div class="workspace-card">
        <header class="flex justify-between items-center mb-8 border-b border-gray-100 pb-4">
            <div class="flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#4f46e5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg>
                <h1 class="text-xl font-bold text-gray-900">Workspace</h1>
            </div>
            
            <div id="status-container" class="flex items-center gap-2 px-3 py-1.5 bg-gray-50 rounded-full border border-gray-200">
                <div id="status-dot" class="w-2.5 h-2.5 rounded-full bg-gray-400"></div>
                <span id="status-text" class="text-sm font-medium text-gray-600">Carregando...</span>
            </div>
        </header>

        <main>
            <input type="text" id="note-title" placeholder="Sem título..." 
                class="w-full mb-6 p-2 text-4xl font-extrabold text-gray-900 placeholder-gray-300 border-none focus:ring-0 outline-none transition-all" autocomplete="off">
            
            <textarea id="note-content" placeholder="Comece a escrever ou detalhar sua tarefa aqui..." 
                class="w-full h-80 p-2 text-lg text-gray-700 placeholder-gray-400 border-none focus:ring-0 outline-none resize-none leading-relaxed" autocomplete="off"></textarea>
        </main>

        <footer class="mt-8 pt-6 border-t border-gray-100 flex flex-col sm:flex-row justify-between items-center gap-4">
            <p class="text-xs text-gray-400 max-w-sm text-center sm:text-left">
                Sincronização P2P ativa. Os dados são salvos no seu navegador e trafegam criptografados.
            </p>
            
            <button id="share-btn" class="w-full sm:w-auto bg-indigo-600 text-white px-6 py-2.5 rounded-lg hover:bg-indigo-700 transition-colors font-semibold flex items-center justify-center gap-2 shadow-sm">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
                Compartilhar Acesso
            </button>
        </footer>
    </div>

    <script type="module">
        import * as Y from 'https://esm.sh/yjs@13.6.14';
        import { WebrtcProvider } from 'https://esm.sh/y-webrtc@10.3.0';
        import { IndexeddbPersistence } from 'https://esm.sh/y-indexeddb@9.0.12';

        // 1. Gerenciamento da Sala (URL)
        const urlParams = new URLSearchParams(window.location.search);
        let roomName = urlParams.get('room');
        
        if (!roomName) {
            // Cria um ID único se não existir e limpa a URL visualmente
            roomName = 'ws-' + Math.random().toString(36).substring(2, 12);
            window.history.replaceState({}, '', `?room=${roomName}`);
        }

        // 2. Inicialização do Yjs (O cérebro dos dados)
        const ydoc = new Y.Doc();
        const yWorkspace = ydoc.getMap('workspace');

        // Referências da Interface
        const titleInput = document.getElementById('note-title');
        const contentInput = document.getElementById('note-content');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        const shareBtn = document.getElementById('share-btn');

        // 3. Persistência Offline (IndexedDB)
        const localProvider = new IndexeddbPersistence(roomName, ydoc);
        
        localProvider.on('synced', () => {
            // Assim que carrega do PC, joga para a tela
            if (!titleInput.value) titleInput.value = yWorkspace.get('title') || '';
            if (!contentInput.value) contentInput.value = yWorkspace.get('content') || '';
            statusText.innerText = "Offline (Salvo localmente)";
        });

        // 4. Conexão P2P (WebRTC)
        const networkProvider = new WebrtcProvider(roomName, ydoc, {
            // Servidores de sinalização públicos confiáveis
            signaling: ['wss://signaling.yjs.dev', 'wss://y-webrtc-signaling-eu.herokuapp.com']
        });

        // 5. Sincronização Bidirecional (Tela <-> Rede)
        
        // Recebendo dados da rede/banco local
        yWorkspace.observe(() => {
            if (document.activeElement !== titleInput) {
                titleInput.value = yWorkspace.get('title') || '';
            }
            if (document.activeElement !== contentInput) {
                contentInput.value = yWorkspace.get('content') || '';
            }
        });

        // Enviando dados da tela para a rede
        titleInput.addEventListener('input', () => yWorkspace.set('title', titleInput.value));
        contentInput.addEventListener('input', () => yWorkspace.set('content', contentInput.value));

        // 6. Monitoramento de Usuários Online
        networkProvider.awareness.on('change', () => {
            // Quantidade de peers (inclui você mesmo)
            const users = networkProvider.awareness.getStates().size;
            
            if (users > 1) {
                statusDot.classList.replace('bg-gray-400', 'bg-green-500');
                statusText.innerText = `${users} online na sala`;
            } else {
                statusDot.classList.replace('bg-green-500', 'bg-gray-400');
                statusText.innerText = "Somente você (Salvo localmente)";
            }
        });

        // 7. Botão de Compartilhar (Robusto e à prova de bloqueios)
        shareBtn.addEventListener('click', async () => {
            const currentUrl = window.location.href;
            const originalText = shareBtn.innerHTML;
            
            try {
                // Tenta a API moderna de Clipboard
                await navigator.clipboard.writeText(currentUrl);
                feedbackSucesso();
            } catch (err) {
                // Fallback para navegadores restritos ou HTTP sem localhost
                try {
                    const tempInput = document.createElement('input');
                    tempInput.value = currentUrl;
                    document.body.appendChild(tempInput);
                    tempInput.select();
                    document.execCommand('copy');
                    document.body.removeChild(tempInput);
                    feedbackSucesso();
                } catch (fallbackErr) {
                    // Se tudo falhar, avisa o usuário
                    alert('Seu navegador bloqueou a cópia automática. Por favor, copie o link diretamente da barra de endereços (URL) lá em cima!');
                }
            }

            function feedbackSucesso() {
                shareBtn.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
                    Link Copiado!
                `;
                shareBtn.classList.replace('bg-indigo-600', 'bg-green-600');
                shareBtn.classList.replace('hover:bg-indigo-700', 'hover:bg-green-700');
                
                setTimeout(() => {
                    shareBtn.innerHTML = originalText;
                    shareBtn.classList.replace('bg-green-600', 'bg-indigo-600');
                    shareBtn.classList.replace('hover:bg-green-700', 'hover:bg-indigo-700');
                }, 3000);
            }
        });

    </script>
</body>
</html>
